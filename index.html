<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#013220,#014128,#01613c);
  padding:18px 30px;
  color:white;
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{height:60px;border-radius:12px;}
.title-main{font-size:24px;font-weight:700;}
.title-sub{font-size:14px;color:#d4f3e5;}

/* HERO – STICKY */
#hero{
  position:sticky;
  top:0;
  z-index:10;
  background:#e9ecef;
  padding:18px 25px;
  border-radius:0 0 25px 25px;
}

/* QUICK BUTTONS – VRAĆAMO BOJU */
.quick-buttons button{
  background:#d9e4dd;
  color:#1f2d2a;
  border:none;
  border-radius:20px;
  padding:8px 14px;
  margin:6px 6px 0 0;
  cursor:pointer;
  transition:all .2s ease;
}

.quick-buttons button:hover{
  background:#014128;
  color:white;
}

/* CHAT */
#chat{
  padding:20px;
}

/* PORUKE */
.message{
  max-width:70%;
  padding:12px 16px;
  border-radius:18px;
  line-height:1.4;
  margin-bottom:10px;
  white-space:pre-wrap;
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:6px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:6px;
}

/* Typing bubble */
.typing{
  display:flex;
  gap:6px;
  align-items:center;
}

.dot{
  width:8px;
  height:8px;
  background:#999;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

/* INPUT */
#input-area{
  position:sticky;
  bottom:0;
  background:#fff;
  display:flex;
  padding:14px;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

button.send{
  margin-left:8px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" class="logo">
    <div>
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</header>

<div id="hero"></div>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button class="send" onclick="sendMessage()">Pošalji</button>
</div>

<script>
const hero=document.getElementById("hero");
const chat=document.getElementById("chat");

/* WEATHER */
async function loadWeather(){
  try{
    const r=await fetch("/api/weather");
    const d=await r.json();
    if(d.temperature!==undefined){
      return "🌤 "+d.temperature+"°C • Vjetar "+d.windspeed+" km/h";
    }
  }catch{}
  return "Vrijeme trenutno nije dostupno.";
}

/* HERO */
async function initHero(){
  const weather=await loadWeather();
  hero.innerHTML=
    "<strong>Sada je u Valpovu:</strong><br><br>"+weather+
    "<div class='quick-buttons'>"+
    "<button onclick=\"quickAsk('Znamenitosti')\">Znamenitosti</button>"+
    "<button onclick=\"quickAsk('Gastronomija')\">Gastronomija</button>"+
    "<button onclick=\"quickAsk('Događanja')\">Događanja</button>"+
    "<button onclick=\"quickAsk('Smještaj')\">Smještaj</button>"+
    "<button onclick=\"quickAsk('Priroda')\">Priroda</button>"+
    "</div>";
}

/* PORUKE */
function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;

  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/(\d+\.\s)/g,"\n$1");

  div.innerHTML=text;
  chat.appendChild(div);

  window.scrollTo({
    top:document.body.scrollHeight,
    behavior:"smooth"
  });
}

/* TYPING */
function showTyping(){
  const div=document.createElement("div");
  div.className="message ai typing";
  div.id="typing";
  div.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
  chat.appendChild(div);

  window.scrollTo({
    top:document.body.scrollHeight
  });
}

function removeTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}

function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showTyping();

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await response.json();
    removeTyping();
    addMessage(data.reply || "Nema odgovora.");
  }catch{
    removeTyping();
    addMessage("Došlo je do greške.");
  }
}

window.onload=initHero;
</script>

</body>
</html>
