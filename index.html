<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== HEADER ===== */
.header{
  background: linear-gradient(135deg, #013220, #014128, #01613c);
  padding:18px 30px;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  height:60px;
  border-radius:12px;
}

.title-main{
  color:white;
  font-size:24px;
  font-weight:700;
}

.title-sub{
  color:#d4f3e5;
  font-size:14px;
}

/* ===== HERO BLOK ===== */
#hero{
  background:#e9ecef;
  padding:20px 25px;
  border-radius:0 0 25px 25px;
  margin-bottom:10px;
}

.quick-buttons button{
  background:#d9e4dd;
  border:none;
  border-radius:20px;
  padding:8px 14px;
  margin:5px 5px 0 0;
  cursor:pointer;
}

/* ===== CHAT ===== */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px 20px;
}

.message{
  max-width:75%;
  margin-bottom:10px;
  padding:12px;
  border-radius:16px;
  line-height:1.5;
  white-space:pre-wrap;
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:4px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:4px;
}

/* ===== INPUT ===== */
#input-area{
  display:flex;
  padding:12px;
  background:#fff;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:10px;
  border-radius:25px;
  border:1px solid #ccc;
}

button.send{
  margin-left:8px;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" class="logo">
    <div>
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</header>

<div id="hero"></div>
<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button class="send" onclick="sendMessage()">Pošalji</button>
</div>

<script>
const hero = document.getElementById("hero");
const chat = document.getElementById("chat");

/* ===== WEATHER ===== */
async function loadWeather(){
  try{
    const r = await fetch("/api/weather");
    const d = await r.json();
    if(d.temperature!==undefined){
      return "🌤 "+d.temperature+"°C • Vjetar "+d.windspeed+" km/h";
    }
  }catch(e){}
  return "Vrijeme trenutno nije dostupno.";
}

/* ===== HERO INIT ===== */
async function initHero(){
  const weather = await loadWeather();

  hero.innerHTML =
    "<strong>Sada je u Valpovu:</strong><br><br>" +
    weather +
    "<div class='quick-buttons'>" +
    "<button onclick=\"quickAsk('Znamenitosti')\">Znamenitosti</button>" +
    "<button onclick=\"quickAsk('Gastronomija')\">Gastronomija</button>" +
    "<button onclick=\"quickAsk('Događanja')\">Događanja</button>" +
    "<button onclick=\"quickAsk('Smještaj')\">Smještaj</button>" +
    "<button onclick=\"quickAsk('Priroda')\">Priroda</button>" +
    "</div>";
}

/* ===== CHAT ===== */
function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await response.json();
    let reply=data.reply || "Nema odgovora.";

    reply = reply.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
    reply = reply.replace(/(\d+\.\s)/g,"<br>$1");

    addMessage(reply);
  }catch(e){
    addMessage("Došlo je do greške.");
  }
}

window.onload = initHero;
</script>

</body>
</html>
