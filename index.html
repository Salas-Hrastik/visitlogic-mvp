<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== HEADER ===== */
.header{
  background: linear-gradient(135deg, #013220, #014128, #01613c);
  padding:18px 30px;
  box-shadow:0 8px 25px rgba(0,0,0,0.35);
  position:sticky;
  top:0;
  z-index:100;
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  height:60px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.title-group{
  display:flex;
  flex-direction:column;
}

.title-main{
  color:white;
  font-size:24px;
  font-weight:700;
}

.title-sub{
  color:#d4f3e5;
  font-size:14px;
}

/* ===== CHAT ===== */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:80%;
  margin-bottom:15px;
  padding:15px;
  border-radius:18px;
  line-height:1.6;
  white-space:pre-line;
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:4px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:4px;
}

/* ===== Typing ===== */
.typing{
  display:flex;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#999;
  border-radius:50%;
  animation: blink 1.4s infinite both;
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

/* ===== INPUT ===== */
#input-area{
  display:flex;
  padding:15px;
  background:#fff;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  cursor:pointer;
}

.quick-buttons{
  margin-top:15px;
}

.quick-buttons button{
  background:#d9e4dd;
  color:#333;
  margin:5px 5px 0 0;
  font-size:14px;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .logo{ height:45px; }
  .title-main{ font-size:18px; }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" class="logo">
    <div class="title-group">
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button onclick="sendMessage()">Pošalji</button>
</div>

<script>
const chat = document.getElementById("chat");

function formatResponse(text){
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/(\d+\.\s)/g, "\n$1");
  return text;
}

function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const div=document.createElement("div");
  div.className="message ai typing";
  div.id="typing";
  div.innerHTML=`
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}

/* ===== WEATHER ===== */
async function loadWeather(){
  try{
    const response=await fetch("/api/weather");
    const data=await response.json();
    if(data.temperature!==undefined){
      return `🌤 ${data.temperature}°C • Vjetar ${data.windspeed} km/h`;
    }
  }catch{}
  return "Vrijeme trenutno nije dostupno.";
}

/* ===== WELCOME ===== */
async function welcome(){
  const weather=await loadWeather();

  addMessage(`
<strong>Dobrodošli!</strong>

<strong>Danas je u Valpovu:</strong>
${weather}

<div class="quick-buttons">
<button onclick="quickAsk('Znamenitosti')">Znamenitosti</button>
<button onclick="quickAsk('Gastronomija')">Gastronomija</button>
<button onclick="quickAsk('Događanja')">Događanja</button>
<button onclick="quickAsk('Smještaj')">Smještaj</button>
<button onclick="quickAsk('Priroda')">Priroda</button>
</div>
`);
}

function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

/* ===== SEND ===== */
async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showTyping();

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await response.json();

    removeTyping();
    addMessage(formatResponse(data.reply || "Nema odgovora."));
  }catch{
    removeTyping();
    addMessage("Došlo je do greške u komunikaciji.");
  }
}

welcome();
</script>

</body>
</html>
