<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turistički informator Valpovo</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0e4f2b;
color:#222;
}

header{
background:#0c3d24;
color:white;
padding:18px 24px;
display:flex;
align-items:center;
gap:16px;
}

header img{
width:60px;
height:60px;
border-radius:12px;
object-fit:cover;
}

header h1{
margin:0;
font-size:24px;
}

header small{
opacity:0.8;
}

.main{
max-width:900px;
margin:auto;
padding:24px;
}

.chat-box{
background:white;
border-radius:14px;
padding:20px;
min-height:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
overflow-y:auto;
}

.user-message{
background:#2f7d32;
color:white;
padding:12px 16px;
border-radius:10px;
margin:12px 0;
text-align:right;
}

.bot-message{
background:#f2f2f2;
padding:14px 16px;
border-radius:10px;
margin:12px 0;
line-height:1.5;
}

.input-row{
margin-top:16px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#d1ad33;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.quick{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.quick button{
background:#1e6a34;
color:white;
}

a{
color:#1a73e8;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>


<header>

<img src="katancic-portrait.png">

<div>
<h1>Turistički informator</h1>
<small>Grad Valpovo • AI asistent</small>
</div>

</header>


<div class="main">

<div id="chat-box" class="chat-box"></div>

<div class="input-row">

<input id="user-input" placeholder="Postavite pitanje...">

<button id="send-btn">Pošalji</button>

</div>

<div class="quick">

<button onclick="quickAsk('znamenitosti')">🏛 Znamenitosti</button>
<button onclick="quickAsk('gastronomija')">🍽 Gastronomija</button>
<button onclick="quickAsk('događanja')">🎉 Događanja</button>
<button onclick="quickAsk('smještaj')">🛏 Smještaj</button>

</div>

</div>


<script>


function formatReply(text){

return text
.replace(/\n/g,"<br>")
.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

}



function addMessage(text,type){

const chatBox=document.getElementById("chat-box")

const div=document.createElement("div")

div.className= type==="user" ? "user-message" : "bot-message"

div.innerHTML=text

chatBox.appendChild(div)

chatBox.scrollTop=chatBox.scrollHeight

}



async function sendMessage(){

const input=document.getElementById("user-input")

const message=input.value.trim()

if(!message) return

addMessage(message,"user")

input.value=""

const loading=document.createElement("div")
loading.className="bot-message"
loading.innerText="Asistent razmišlja..."

document.getElementById("chat-box").appendChild(loading)

try{

const controller=new AbortController()

const timeout=setTimeout(()=>controller.abort(),25000)

const response=await fetch("/api/chat",{

method:"POST",

signal:controller.signal,

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({message})

})

clearTimeout(timeout)

const data=await response.json()

loading.remove()

if(data.reply){

addMessage(formatReply(data.reply),"bot")

}else{

addMessage("Asistent nije dao odgovor.","bot")

}

}catch(e){

loading.remove()

if(e.name==="AbortError"){

addMessage("Odgovor traje dulje nego očekivano. Pokušajte ponovno.","bot")

}else{

addMessage("Greška u komunikaciji sa serverom.","bot")

}

}

}



function quickAsk(text){

document.getElementById("user-input").value=text

sendMessage()

}



document.getElementById("send-btn").addEventListener("click",sendMessage)


document.getElementById("user-input").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()

sendMessage()

}

})

</script>


</body>
</html>
