<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
  overflow:hidden; /* KLJUČNO */
}

/* ===== HEADER FIXED ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:90px;
  background:linear-gradient(135deg,#013220,#014128,#01613c);
  padding:18px 30px;
  color:white;
  display:flex;
  align-items:center;
  z-index:10;
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{height:60px;border-radius:12px;}
.title-main{font-size:22px;font-weight:700;}
.title-sub{font-size:13px;color:#d4f3e5;}

/* ===== HERO FIXED ISPOD HEADERA ===== */
#hero{
  position:fixed;
  top:90px;
  left:0;
  right:0;
  background:#e9ecef;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  z-index:9;
}

.quick-buttons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.quick-buttons button{
  background:#d9e4dd;
  border:none;
  border-radius:18px;
  padding:6px 12px;
  cursor:pointer;
}

/* ===== CHAT AREA ===== */
#chat{
  position:absolute;
  top:150px; /* header + hero */
  bottom:80px; /* input visina */
  left:0;
  right:0;
  overflow-y:auto;
  padding:20px;
}

/* Poruke */
.message{
  max-width:900px;
  margin:0 auto 10px auto;
  padding:16px 18px;
  border-radius:16px;
  line-height:1.5;
  white-space:pre-wrap;
}

.ai{
  background:#f1f1f1;
}

.user{
  background:#0f6b3c;
  color:white;
  text-align:right;
}

/* ===== INPUT FIXED ===== */
#input-area{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  display:flex;
  border-top:1px solid #ccc;
  height:80px;
}

#input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

button.send{
  margin-left:8px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  cursor:pointer;
}

/* Typing */
.typing{
  display:flex;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#888;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" class="logo">
    <div>
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</div>

<div id="hero">
  <div>
    <strong>Sada je u Valpovu:</strong>
    <span id="weather"></span>
  </div>

  <div class="quick-buttons">
    <button onclick="quickAsk('Znamenitosti')">Znamenitosti</button>
    <button onclick="quickAsk('Gastronomija')">Gastronomija</button>
    <button onclick="quickAsk('Događanja')">Događanja</button>
    <button onclick="quickAsk('Smještaj')">Smještaj</button>
    <button onclick="quickAsk('Priroda')">Priroda</button>
  </div>
</div>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button class="send" onclick="sendMessage()">Pošalji</button>
</div>

<script>
const chat=document.getElementById("chat");

function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;

  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/(\d+\.\s)/g,"\n$1");

  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const div=document.createElement("div");
  div.className="message ai typing";
  div.id="typing";
  div.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}

function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";
  showTyping();

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await response.json();
    removeTyping();
    addMessage(data.reply || "Nema odgovora.");
  }catch{
    removeTyping();
    addMessage("Došlo je do greške.");
  }
}
</script>

</body>
</html>
