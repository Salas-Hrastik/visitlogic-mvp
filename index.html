<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
*{box-sizing:border-box;}

html, body{
    height:100%;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#014128;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
}

/* HEADER */

header{
    background:linear-gradient(135deg,#014128,#0b5c3c);
    color:white;
    padding:18px 24px;
    display:flex;
    align-items:center;
    gap:15px;
    flex-shrink:0;
}

header img{ height:50px; }

/* CHAT CONTAINER */

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

/* MESSAGE BLOCK */

.message{
    margin-bottom:24px;
    display:flex;
    gap:10px;
}

.message.user{
    justify-content:flex-end;
}

.avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:#0b5c3c;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    flex-shrink:0;
}

.bubble{
    background:white;
    padding:16px 18px;
    border-radius:18px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    max-width:85%;
}

.message.user .bubble{
    background:#0b5c3c;
    color:white;
}

/* FOLLOW UP */

.followUp{
    margin-top:18px;
    padding:14px 16px;
    background:#e8efe9;
    border-left:4px solid #014128;
    border-radius:10px;
    font-style:italic;
}

/* INPUT */

#inputArea{
    background:white;
    padding:12px 16px;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
    position:sticky;
    bottom:0;
}

#input{
    flex:1;
    padding:12px;
    border-radius:24px;
    border:1px solid #ccc;
    font-size:16px;
}

#send{
    padding:10px 18px;
    background:#014128;
    color:white;
    border:none;
    border-radius:24px;
    cursor:pointer;
}

@media (max-width:768px){
    #chat{ padding:16px; }
    .bubble{ max-width:100%; }
}
</style>
</head>

<body>

<header>
<img src="tz-logo-Valpovo.png">
<h2>Turistički informator – Valpovo</h2>
</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Postavite pitanje...">
<button id="send">Pošalji</button>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(text, role="ai"){

        const wrapper = document.createElement("div");
        wrapper.className = role === "user" ? "message user" : "message";

        wrapper.innerHTML = `
            ${role === "ai" ? `<div class="avatar">AI</div>` : ""}
            <div class="bubble">${text}</div>
            ${role === "user" ? `<div class="avatar">Vi</div>` : ""}
        `;

        chat.appendChild(wrapper);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(){

        const message = input.value.trim();
        if(!message) return;

        addMessage(message, "user");
        input.value="";

        try{

            const response = await fetch("/api/chat", {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body:JSON.stringify({ message })
            });

            const data = await response.json();

            let html = `<strong>${data.title || ""}</strong><br><br>${data.intro || ""}`;

            if(data.recommendations && data.recommendations.length){
                html += "<ul>";
                data.recommendations.forEach(r=>{
                    html += `<li><strong>${r.name}</strong><br>${r.reason}</li>`;
                });
                html += "</ul>";
            }

            if(data.followUpQuestion){
                html += `<div class="followUp">${data.followUpQuestion}</div>`;
            }

            addMessage(html);

        }catch(error){
            addMessage("Došlo je do tehničke pogreške.");
        }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", e=>{
        if(e.key==="Enter") sendMessage();
    });

});

</script>

</body>
</html>
