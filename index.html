<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turistički informator Valpovo</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f4f2f;
margin:0;
padding:0;
}

header{
background:#0b3c24;
color:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

header img{
width:60px;
height:60px;
border-radius:12px;
}

header h1{
margin:0;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.chat-box{
background:white;
border-radius:12px;
padding:20px;
min-height:300px;
}

.user-message{
background:#2e7d32;
color:white;
padding:12px;
border-radius:10px;
margin:10px 0;
text-align:right;
}

.assistant-message{
background:#f1f1f1;
padding:12px;
border-radius:10px;
margin:10px 0;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#c9a227;
color:black;
font-weight:bold;
cursor:pointer;
}

.quick-buttons{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.quick-buttons button{
background:#1b5e20;
color:white;
}

</style>

</head>

<body>

<header>

<img src="katancic-portrait.png">

<div>
<h1>Turistički informator</h1>
<div>Grad Valpovo • Pametni asistent</div>
</div>

</header>


<div class="container">

<div id="chat-box" class="chat-box"></div>

<div class="controls">

<input id="chat-input" placeholder="Postavite pitanje...">

<button onclick="handleSend()">Pošalji</button>

</div>

<div class="quick-buttons">

<button onclick="sendMessage('znamenitosti')">🏛 Znamenitosti</button>
<button onclick="sendMessage('gastronomija')">🍽 Gastronomija</button>
<button onclick="sendMessage('događanja')">🎉 Događanja</button>
<button onclick="sendMessage('smještaj')">🛏 Smještaj</button>

</div>

</div>


<script>

async function sendMessage(message){

const chatBox=document.getElementById("chat-box")

const user=document.createElement("div")
user.className="user-message"
user.textContent=message

chatBox.appendChild(user)

const loading=document.createElement("div")
loading.className="assistant-message"
loading.textContent="Asistent razmišlja..."

chatBox.appendChild(loading)

try{

const controller=new AbortController()

const timeout=setTimeout(()=>controller.abort(),12000)

const response=await fetch("/api/chat",{

method:"POST",

signal:controller.signal,

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

clearTimeout(timeout)

const data=await response.json()

loading.remove()

const bot=document.createElement("div")
bot.className="assistant-message"

if(data.reply){

bot.innerHTML=data.reply
.replace(/\n/g,"<br>")
.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')

}else{

bot.textContent="Nema odgovora."

}

chatBox.appendChild(bot)

chatBox.scrollTop=chatBox.scrollHeight

}catch(e){

loading.remove()

const error=document.createElement("div")
error.className="assistant-message"

if(e.name==="AbortError"){

error.textContent="Odgovor traje dulje nego očekivano. Pokušajte ponovno."

}else{

error.textContent="Greška u komunikaciji sa serverom."

}

chatBox.appendChild(error)

}

}

function handleSend(){

const input=document.getElementById("chat-input")

const message=input.value.trim()

if(!message) return

sendMessage(message)

input.value=""

}

document.getElementById("chat-input")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()

handleSend()

}

})

</script>

</body>

</html>
