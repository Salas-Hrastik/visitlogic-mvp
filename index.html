<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== PREMIUM HEADER ===== */
.header{
  background: linear-gradient(135deg, #013220, #014128, #01613c);
  padding: 18px 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.35);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(6px);
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  height:60px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
  transition: transform 0.3s ease;
}

.logo:hover{
  transform: scale(1.05);
}

.title-group{
  display:flex;
  flex-direction:column;
}

.title-main{
  color:white;
  font-size:24px;
  font-weight:700;
  letter-spacing:0.5px;
}

.title-sub{
  color:#d4f3e5;
  font-size:14px;
  opacity:0.9;
  margin-top:2px;
}

/* ===== CHAT ===== */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:80%;
  margin-bottom:15px;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:4px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:4px;
}

/* ===== INPUT ===== */
#input-area{
  display:flex;
  padding:15px;
  background:#ffffff;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.quick-buttons{
  margin-top:15px;
}

.quick-buttons button{
  background:#d9e4dd;
  color:#333;
  margin:5px 5px 0 0;
  font-size:14px;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .logo{ height:45px; }
  .title-main{ font-size:18px; }
  .title-sub{ font-size:12px; }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" alt="TZ Valpovo logo" class="logo">
    <div class="title-group">
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button onclick="sendMessage()">Pošalji</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* ===== WEATHER (Open-Meteo via /api/weather) ===== */
async function loadWeather(){
  try{
    const response=await fetch("/api/weather");
    const data=await response.json();
    if(data.temperature!==undefined){
      return `🌤 ${data.temperature}°C • Vjetar ${data.windspeed} km/h`;
    } else {
      return "Vrijeme trenutno nije dostupno.";
    }
  }catch{
    return "Vrijeme trenutno nije dostupno.";
  }
}

/* ===== WELCOME ===== */
async function welcome(){
  const weather=await loadWeather();

  addMessage(`
    <strong>Dobrodošli!</strong><br><br>
    <strong>Danas je u Valpovu:</strong><br>
    ${weather}
    <div class="quick-buttons">
      <button onclick="quickAsk('Znamenitosti')">Znamenitosti</button>
      <button onclick="quickAsk('Gastronomija')">Gastronomija</button>
      <button onclick="quickAsk('Događanja')">Događanja</button>
      <button onclick="quickAsk('Smještaj')">Smještaj</button>
      <button onclick="quickAsk('Priroda')">Priroda</button>
    </div>
  `);
}

/* ===== QUICK ASK ===== */
function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

/* ===== CHAT SEND ===== */
async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });
    const data=await response.json();
    addMessage(data.reply || "Nema odgovora.");
  }catch{
    addMessage("Došlo je do greške u komunikaciji.");
  }
}

welcome();
</script>

</body>
</html>
