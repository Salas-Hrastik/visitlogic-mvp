<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background:#0b4f2f;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#014128;
  color:white;
  padding:15px;
  font-size:22px;
  font-weight:600;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:80%;
  margin-bottom:15px;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:4px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:4px;
}

#input-area{
  display:flex;
  padding:15px;
  background:#ffffff;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.quick-buttons{
  margin-top:15px;
}

.quick-buttons button{
  background:#d9e4dd;
  color:#333;
  margin:5px 5px 0 0;
  font-size:14px;
}
</style>
</head>

<body>

<header>Turistički informator – Valpovo</header>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button onclick="sendMessage()">Pošalji</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type="ai"){
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function loadWeather(){
  try{
    const response = await fetch("/api/weather");
    const data = await response.json();

    if(data.temperature !== undefined){
      return `🌤 ${data.temperature}°C • Vjetar ${data.windspeed} km/h`;
    } else {
      return "Vrijeme trenutno nije dostupno.";
    }
  }catch{
    return "Vrijeme trenutno nije dostupno.";
  }
}

async function welcome(){
  const weather = await loadWeather();

  addMessage(`
    <strong>Dobrodošli!</strong><br><br>
    <strong>Danas je u Valpovu:</strong><br>
    ${weather}
    <div class="quick-buttons">
      <button onclick="quickAsk('Znamenitosti')">Znamenitosti</button>
      <button onclick="quickAsk('Gastronomija')">Gastronomija</button>
      <button onclick="quickAsk('Događanja')">Događanja</button>
      <button onclick="quickAsk('Smještaj')">Smještaj</button>
      <button onclick="quickAsk('Priroda')">Priroda</button>
    </div>
  `);
}

function quickAsk(text){
  document.getElementById("input").value = text;
  sendMessage();
}

async function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  try{
    const response = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await response.json();
    addMessage(data.reply || "Nema odgovora.");
  }catch{
    addMessage("Došlo je do greške u komunikaciji.");
  }
}

welcome();
</script>

</body>
</html>
