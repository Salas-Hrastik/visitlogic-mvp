<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turistički informator – Valpovo</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:#0b4f2f;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  background: linear-gradient(135deg,#013220,#014128,#01613c);
  padding:18px 30px;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

.header-inner{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{ height:60px; border-radius:12px; }

.title-main{ color:white; font-size:24px; font-weight:700; }
.title-sub{ color:#d4f3e5; font-size:14px; }

/* ===== HERO (NE SKROLA) ===== */
#hero{
  background:#e9ecef;
  padding:18px 25px;
  border-radius:0 0 25px 25px;
}

/* ===== CHAT KONTEJNER ===== */
#chat-container{
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== CHAT ===== */
#chat{
  flex:1;
  overflow-y:auto;
  padding:15px 20px;
  scroll-behavior:smooth;
}

/* ===== PORUKE ===== */
.message{
  max-width:75%;
  padding:10px 14px;
  border-radius:14px;
  line-height:1.4;
  margin-bottom:8px;
  white-space:pre-wrap;
}

.message p{
  margin:4px 0;   /* MANJI RAZMAK IZMEĐU PASUSA */
}

.ai{
  background:#f1f1f1;
  border-top-left-radius:4px;
}

.user{
  background:#0f6b3c;
  color:white;
  margin-left:auto;
  border-top-right-radius:4px;
}

/* ===== INPUT ===== */
#input-area{
  display:flex;
  padding:12px;
  background:#fff;
  border-top:1px solid #ccc;
}

#input{
  flex:1;
  padding:10px;
  border-radius:25px;
  border:1px solid #ccc;
}

button.send{
  margin-left:8px;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:#014128;
  color:white;
  cursor:pointer;
}

/* ===== QUICK BUTTONS ===== */
.quick-buttons button{
  background:#d9e4dd;
  border:none;
  border-radius:18px;
  padding:6px 12px;
  margin:6px 6px 0 0;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <img src="tz-logo-Valpovo.png" class="logo">
    <div>
      <div class="title-main">Turistički informator</div>
      <div class="title-sub">Grad Valpovo</div>
    </div>
  </div>
</header>

<div id="hero"></div>

<div id="chat-container">
  <div id="chat"></div>
</div>

<div id="input-area">
  <input id="input" placeholder="Postavite pitanje..." />
  <button class="send" onclick="sendMessage()">Pošalji</button>
</div>

<script>
const hero = document.getElementById("hero");
const chat = document.getElementById("chat");

/* ===== WEATHER ===== */
async function loadWeather(){
  try{
    const r=await fetch("/api/weather");
    const d=await r.json();
    if(d.temperature!==undefined){
      return "🌤 "+d.temperature+"°C • Vjetar "+d.windspeed+" km/h";
    }
  }catch(e){}
  return "Vrijeme trenutno nije dostupno.";
}

/* ===== HERO INIT ===== */
async function initHero(){
  const weather = await loadWeather();
  hero.innerHTML =
    "<strong>Sada je u Valpovu:</strong><br><br>"+
    weather+
    "<div class='quick-buttons'>"+
    "<button onclick=\"quickAsk('Znamenitosti')\">Znamenitosti</button>"+
    "<button onclick=\"quickAsk('Gastronomija')\">Gastronomija</button>"+
    "<button onclick=\"quickAsk('Događanja')\">Događanja</button>"+
    "<button onclick=\"quickAsk('Smještaj')\">Smještaj</button>"+
    "<button onclick=\"quickAsk('Priroda')\">Priroda</button>"+
    "</div>";
}

/* ===== DODAJ PORUKU ===== */
function addMessage(text,type="ai"){
  const div=document.createElement("div");
  div.className="message "+type;

  // Bolji format teksta
  text = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  text = text.replace(/(\d+\.\s)/g,"\n$1");

  div.innerHTML = text;
  chat.appendChild(div);

  // Skrolamo SAMO chat, ne cijelu stranicu
  chat.scrollTop = chat.scrollHeight;
}

/* ===== QUICK ===== */
function quickAsk(text){
  document.getElementById("input").value=text;
  sendMessage();
}

/* ===== SEND ===== */
async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await response.json();
    addMessage(data.reply || "Nema odgovora.");
  }catch(e){
    addMessage("Došlo je do greške.");
  }
}

window.onload = initHero;
</script>

</body>
</html>
